name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. Changelog ────────────────────────────────────────────────────────────
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-cliff は全履歴が必要

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog for this release
        id: cliff
        run: |
          # 今回のタグ分の変更のみ抽出してリリースノートとして使う
          git-cliff --config cliff.toml --latest --strip header \
            --output CHANGELOG_RELEASE.md
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          cat CHANGELOG_RELEASE.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate full CHANGELOG.md
        run: |
          git-cliff --config cliff.toml --output CHANGELOG.md

      - name: Upload CHANGELOG.md as artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md

  # ── 2. Build (マトリクス) ────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: ryoiki
            asset: ryoiki-linux-x86_64
            use_cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: ryoiki
            asset: ryoiki-linux-aarch64
            use_cross: true

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: ryoiki
            asset: ryoiki-linux-x86_64-musl
            use_cross: true

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: ryoiki
            asset: ryoiki-macos-x86_64
            use_cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: ryoiki
            asset: ryoiki-macos-aarch64
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: ryoiki.exe
            asset: ryoiki-windows-x86_64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          dst="${{ matrix.asset }}"
          cp "$src" "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  # ── 3. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [changelog, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: "ryoiki-*"

      - name: Download CHANGELOG.md
        uses: actions/download-artifact@v4
        with:
          name: changelog
          path: .

      - name: Flatten dist directory
        run: |
          mkdir -p release-assets
          find dist -type f | while read f; do
            cp "$f" "release-assets/$(basename "$f")"
          done

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.changelog.outputs.release_body }}
          files: |
            release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      # CHANGELOG.md を main ブランチにコミットして戻す
      - name: Commit CHANGELOG.md to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(release): update CHANGELOG.md for ${{ github.ref_name }}"
          branch: main
          file_pattern: CHANGELOG.md
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

  # ── 4. crates.io publish ─────────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # dry-run でパッケージ内容を事前確認
      - name: cargo publish --dry-run
        run: cargo publish --dry-run

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
